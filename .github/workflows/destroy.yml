name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to Destroy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  destroy:
    name: Terragrunt Destroy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt run-all init --terragrunt-working-dir environments/${{ inputs.environment }} --terragrunt-non-interactive
      - run: terragrunt run-all destroy --terragrunt-working-dir environments/${{ inputs.environment }} --terragrunt-non-interactive
