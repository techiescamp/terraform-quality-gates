name: PR Quality Gates

on:
  pull_request:
    branches: [main]

env:
  TF_VERSION: 1.9.0

jobs:
  format-check:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [modules/vpc, modules/ec2, environments/dev, environments/staging, environments/prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform -chdir=${{ matrix.dir }} init -backend=false
      - run: terraform -chdir=${{ matrix.dir }} validate

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [modules/vpc, modules/ec2, environments/dev, environments/staging, environments/prod]
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: tflint --chdir=${{ matrix.dir }} --format compact

  security-scan:
    name: Checkov Security Scan (HARD GATE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false        # HIGH findings BLOCK the merge
          output_format: github_failed_only

  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Document VPC Module
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: modules/vpc
          output-file: README.md
          output-method: inject
          git-push: false
      - name: Document EC2 Module
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: modules/ec2
          output-file: README.md
          output-method: inject
          git-push: true