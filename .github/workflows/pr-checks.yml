name: PR Quality Gates

on:
  pull_request:
    branches:
      - main

env:
  TF_VERSION: 1.9.0

jobs:
  format-check:
    name: Terragrunt Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - run: terragrunt hclfmt -check

  validate:
    name: Terragrunt Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [environments/dev/vpc, environments/dev/ec2, environments/staging/vpc, environments/staging/ec2, environments/prod/vpc, environments/prod/ec2]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt init -backend=false --terragrunt-working-dir ${{ matrix.dir }} --terragrunt-non-interactive
      - run: terragrunt validate --terragrunt-working-dir ${{ matrix.dir }} --terragrunt-non-interactive

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [environments/dev/vpc, environments/dev/ec2, environments/staging/vpc, environments/staging/ec2, environments/prod/vpc, environments/prod/ec2]
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: tflint --chdir=${{ matrix.dir }} --format compact

  security-scan:
    name: Checkov Security Scan (HARD GATE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false        # HIGH findings BLOCK the merge
          output_format: github_failed_only

  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: modules
          soft_fail: false

  terratest:
    name: Terratest (Functional Verification)
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Run Terratest
        run: |
          cd tests
          go mod download
          go test -v -timeout 30m vpc_ec2_test.go

  infracost:
    name: Infracost (Cost Estimation)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api_key: ${{ secrets.INFRACOST_API_KEY }}
      - name: Generate Infracost JSON
        run: |
          infracost breakdown --path . --format json --out-file /tmp/infracost.json
      - name: Post Infracost Comment
        uses: infracost/actions/comment@v3
        with:
          path: /tmp/infracost.json
          behavior: update

  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Document VPC Module
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: modules/vpc
          output-file: README.md
          output-method: inject
          git-push: false
      - name: Document EC2 Module
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: modules/ec2
          output-file: README.md
          output-method: inject
          git-push: true