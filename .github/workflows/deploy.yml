name: Deployment Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  deploy-dev:
    name: Deploy to Dev
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt run-all init --terragrunt-working-dir environments/dev --terragrunt-non-interactive
      - run: terragrunt run-all apply --terragrunt-working-dir environments/dev --terragrunt-non-interactive
      - name: Smoke Test (EC2 Health Check)
        run: |
          cd environments/dev/ec2
          INSTANCE_ID=$(terragrunt output -no-color -json | jq -r '.instance_id.value')
          echo "Checking health of instance: $INSTANCE_ID"
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID

  deploy-staging:
    name: Deploy to Staging
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt run-all init --terragrunt-working-dir environments/staging --terragrunt-non-interactive
      - run: terragrunt run-all apply --terragrunt-working-dir environments/staging --terragrunt-non-interactive
      - name: Smoke Test (EC2 Health Check)
        run: |
          cd environments/staging/ec2
          INSTANCE_ID=$(terragrunt output -no-color -json | jq -r '.instance_id.value')
          echo "Checking health of instance: $INSTANCE_ID"
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID

  deploy-prod:
    name: Deploy to Production
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt run-all init --terragrunt-working-dir environments/prod --terragrunt-non-interactive
      - run: terragrunt run-all apply --terragrunt-working-dir environments/prod --terragrunt-non-interactive
      - name: Smoke Test (EC2 Health Check)
        run: |
          cd environments/prod/ec2
          INSTANCE_ID=$(terragrunt output -no-color -json | jq -r '.instance_id.value')
          echo "Checking health of instance: $INSTANCE_ID"
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID