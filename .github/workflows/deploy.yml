name: Deployment Pipeline

on:
  push:
    branches:
      - develop
      - main
      - production

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - name: Set Environment Directory
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "ENV_DIR=environments/dev" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV_DIR=environments/staging" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" = "refs/heads/production" ]; then
            echo "ENV_DIR=environments/prod" >> $GITHUB_ENV
          fi
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt run-all init --terragrunt-working-dir ${{ env.ENV_DIR }} --terragrunt-non-interactive
      - run: terragrunt run-all plan --terragrunt-working-dir ${{ env.ENV_DIR }} --terragrunt-non-interactive

  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - name: Set Environment Directory
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "ENV_DIR=environments/dev" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV_DIR=environments/staging" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" = "refs/heads/production" ]; then
            echo "ENV_DIR=environments/prod" >> $GITHUB_ENV
          fi
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt run-all init --terragrunt-working-dir ${{ env.ENV_DIR }} --terragrunt-non-interactive
      - run: terragrunt run-all apply --terragrunt-working-dir ${{ env.ENV_DIR }} --terragrunt-non-interactive