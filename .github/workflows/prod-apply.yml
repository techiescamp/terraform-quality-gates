name: Production Apply

on:
  push:
    branches: [main]

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt run-all init --terragrunt-working-dir environments/prod --terragrunt-non-interactive
      - run: terragrunt run-all plan --terragrunt-working-dir environments/prod --terragrunt-non-interactive

  apply:
    name: Terragrunt Apply (Production Gate)
    runs-on: ubuntu-latest
    needs: plan
    environment: production      
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Install Terragrunt
        run: |
          sudo wget -qO /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: terragrunt run-all init --terragrunt-working-dir environments/prod --terragrunt-non-interactive
      - run: terragrunt run-all apply --terragrunt-working-dir environments/prod --terragrunt-non-interactive